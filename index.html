<!DOCTYPE html>
<html lang="es">
<head>
    <meta charset="UTF-8">
    <title>Diagnóstico de conexión Supabase</title>
    <script src="https://cdn.jsdelivr.net/npm/@supabase/supabase-js@2"></script>
    <style>
        body { font-family: sans-serif; background: #0b0f14; color: #e6edf3; padding: 20px; }
        .log { background: #161b22; padding: 15px; border-radius: 10px; margin: 10px 0; border: 1px solid #30363d; }
        .ok { color: #3fb950; } .err { color: #f85149; } .info { color: #58a6ff; }
        button { padding: 10px 20px; margin: 5px; cursor: pointer; }
    </style>
</head>
<body>
    <h1>🔍 Diagnóstico Supabase</h1>
    <div class="log" id="log"></div>
    <button onclick="probarConexion()">🔄 Probar conexión</button>
    <button onclick="intentarCrearTabla()">🛠️ Intentar crear tabla (SQL)</button>
    <p class="info">Abre la consola del navegador (F12) para más detalles.</p>

    <script>
        const SUPABASE_URL = "https://zavonkfpunwwqjliojtb.supabase.co";
        const SUPABASE_ANON_KEY = "sb_publishable_MEkptp0YhHcsTLDPoIl0Nw_s3kMyYo9";
        const supabase = window.supabase.createClient(SUPABASE_URL, SUPABASE_ANON_KEY);

        function log(msg, tipo = 'info') {
            const div = document.getElementById('log');
            const clase = tipo === 'ok' ? 'ok' : tipo === 'err' ? 'err' : 'info';
            div.innerHTML += `<div class="${clase}">[${new Date().toLocaleTimeString()}] ${msg}</div>`;
            div.scrollTop = div.scrollHeight;
        }

        async function probarConexion() {
            document.getElementById('log').innerHTML = '';
            log('🔵 Iniciando diagnóstico...', 'info');

            // 1. Verificar que Supabase responde
            log('Probando conexión básica...', 'info');
            try {
                const { data, error } = await supabase.from('tickets').select('id', { count: 'exact', head: true });
                if (error) {
                    log(`❌ Error en consulta: ${error.message}`, 'err');
                    if (error.code === '42P01') {
                        log('❌ La tabla "tickets" NO existe en la base de datos.', 'err');
                        log('💡 Solución: Ejecuta el SQL de creación de tabla en el SQL Editor de Supabase.', 'info');
                    } else if (error.code === '42501') {
                        log('❌ Error de permisos (política RLS).', 'err');
                        log('💡 Solución: Ve a Authentication > Policies y añade políticas para la tabla tickets.', 'info');
                    } else if (error.message.includes('fetch')) {
                        log('❌ No se pudo conectar al servidor. Verifica la URL.', 'err');
                    } else {
                        log(`❌ Error desconocido: ${JSON.stringify(error)}`, 'err');
                    }
                } else {
                    log('✅ Conexión exitosa. La tabla "tickets" existe.', 'ok');
                    log(`📊 Registros en la tabla: ${data ? data.length : 'desconocido'}`, 'info');
                }
            } catch (e) {
                log(`❌ Excepción: ${e.message}`, 'err');
            }
        }

        function intentarCrearTabla() {
            alert('Copia este SQL y pégalo en el SQL Editor de Supabase:\n\n' +
                'CREATE TABLE IF NOT EXISTS tickets (\n' +
                '  id INT PRIMARY KEY,\n' +
                '  sold BOOLEAN DEFAULT FALSE,\n' +
                '  seller TEXT DEFAULT \'\',\n' +
                '  price INT DEFAULT 0,\n' +
                '  fecha_venta TIMESTAMPTZ DEFAULT NULL\n' +
                ');\n\n' +
                'INSERT INTO tickets (id) SELECT generate_series(1, 300)\n' +
                'ON CONFLICT (id) DO NOTHING;\n\n' +
                '-- Luego habilita las políticas (o desactiva RLS para pruebas):\n' +
                'ALTER TABLE tickets ENABLE ROW LEVEL SECURITY;\n' +
                'CREATE POLICY "Acceso público" ON tickets FOR ALL USING (true);'
            );
        }
    </script>
</body>
</html>
