<!DOCTYPE html>
<html lang="es">
<head>
    <meta charset="UTF-8">
    <meta name="viewport" content="width=device-width, initial-scale=1.0">
    <title>Control de Venta de Boletos 1-300</title>
    <style>
        :root {
            --bg: #0b0f14;
            --panel-bg: #131920;
            --border: #2a323d;
            --text: #e6edf3;
            --text-secondary: #8b949e;
            --green-bright: #3fb950;
            --green-bg: #1a3a1f;
            --green-border: #2ea043;
            --green-hover: #26b641;
            --gray-bg: #1c1c20;
            --gray-border: #3a3a3e;
            --gray-hover: #2a2a30;
            --accent: #58a6ff;
            --card-radius: 8px;
            --transition: 0.25s ease;
        }

        * {
            margin: 0;
            padding: 0;
            box-sizing: border-box;
        }
        body {
            background: var(--bg);
            font-family: 'Segoe UI', 'Inter', system-ui, sans-serif;
            color: var(--text);
            min-height: 100vh;
            display: flex;
            justify-content: center;
            align-items: center;
            padding: 16px;
            background-image:
                radial-gradient(ellipse at 20% 30%, rgba(63, 185, 80, 0.04) 0%, transparent 50%),
                radial-gradient(ellipse at 80% 70%, rgba(63, 185, 80, 0.03) 0%, transparent 50%);
        }
        .dashboard {
            width: 100%;
            max-width: 1300px;
            background: var(--panel-bg);
            border-radius: 20px;
            border: 1px solid var(--border);
            padding: 20px 24px 24px;
            box-shadow: 0 20px 50px rgba(0, 0, 0, 0.6);
        }
        /* Header */
        .header {
            display: flex;
            justify-content: space-between;
            align-items: center;
            flex-wrap: wrap;
            gap: 12px;
            margin-bottom: 16px;
            padding-bottom: 14px;
            border-bottom: 1px solid var(--border);
        }
        .header-left h1 {
            font-size: 1.5rem;
            font-weight: 700;
            letter-spacing: -0.3px;
        }
        .total-badge {
            background: #1a1f27;
            border: 1px solid var(--border);
            border-radius: 20px;
            padding: 6px 16px;
            font-size: 0.85rem;
            display: flex;
            align-items: center;
            gap: 8px;
        }
        .total-badge .count {
            font-size: 1.4rem;
            font-weight: 700;
            color: var(--green-bright);
            font-variant-numeric: tabular-nums;
        }
        .timestamp {
            font-family: 'SF Mono', 'Consolas', monospace;
            font-size: 0.8rem;
            color: #7d8590;
        }

        /* Controles */
        .controls {
            display: flex;
            flex-wrap: wrap;
            gap: 10px;
            margin-bottom: 16px;
            align-items: center;
        }
        .btn {
            background: #1c2129;
            border: 1px solid var(--border);
            color: #c9d1d9;
            padding: 8px 16px;
            border-radius: 8px;
            font-size: 0.82rem;
            font-weight: 500;
            cursor: pointer;
            transition: all 0.2s;
            display: flex;
            align-items: center;
            gap: 6px;
            user-select: none;
        }
        .btn:hover {
            background: #242b35;
            border-color: #4a5568;
            color: #fff;
            transform: translateY(-1px);
        }
        .btn:active {
            transform: scale(0.97);
        }
        .btn.accent {
            background: #1a3a2a;
            border-color: #2ea043;
            color: #9fddb0;
        }
        .btn.accent:hover {
            background: #1f4a2f;
            border-color: #3fb950;
            color: #fff;
        }
        .btn.danger {
            background: #2d1a1a;
            border-color: #5a2e2e;
            color: #f0a0a0;
        }
        .btn.danger:hover {
            background: #3d2020;
            border-color: #7a3a3a;
            color: #fff;
        }
        .separator {
            width: 1px;
            height: 24px;
            background: #2d333b;
            margin: 0 6px;
        }
        .legend {
            display: flex;
            gap: 16px;
            font-size: 0.78rem;
            color: #8b949e;
            align-items: center;
            margin-left: auto;
        }
        .legend span {
            display: flex;
            align-items: center;
            gap: 5px;
        }
        .legend-dot {
            width: 12px;
            height: 12px;
            border-radius: 3px;
            border: 1px solid transparent;
        }
        .legend-dot.green {
            background: var(--green-bg);
            border-color: var(--green-border);
        }
        .legend-dot.gray {
            background: var(--gray-bg);
            border-color: var(--gray-border);
        }

        /* Grid */
        .ticket-grid {
            display: grid;
            grid-template-columns: repeat(auto-fill, minmax(62px, 1fr));
            gap: 7px;
            max-height: 60vh;
            overflow-y: auto;
            padding-right: 4px;
        }
        .ticket-grid::-webkit-scrollbar {
            width: 7px;
        }
        .ticket-grid::-webkit-scrollbar-track {
            background: #0f1319;
            border-radius: 10px;
        }
        .ticket-grid::-webkit-scrollbar-thumb {
            background: #2a3039;
            border-radius: 10px;
        }

        .ticket-cell {
            background: var(--gray-bg);
            border: 2px solid var(--gray-border);
            border-radius: var(--card-radius);
            padding: 8px 4px;
            text-align: center;
            cursor: pointer;
            transition:
                background var(--transition),
                border-color var(--transition),
                box-shadow var(--transition),
                transform 0.2s;
            position: relative;
            overflow: hidden;
            min-height: 50px;
            display: flex;
            flex-direction: column;
            align-items: center;
            justify-content: center;
            gap: 2px;
            user-select: none;
            font-weight: 600;
            font-size: 0.8rem;
            color: #6e7681;
        }
        .ticket-cell::after {
            content: '';
            position: absolute;
            inset: 0;
            border-radius: var(--card-radius);
            opacity: 0;
            transition: opacity 0.3s;
            pointer-events: none;
        }
        .ticket-cell.sold {
            background: var(--green-bg);
            border-color: var(--green-border);
            color: #fff;
            box-shadow: 0 2px 10px rgba(63, 185, 80, 0.3);
            animation: subtleGlow 3s ease-in-out infinite;
        }
        .ticket-cell.sold::after {
            background: radial-gradient(ellipse at center, rgba(63, 185, 80, 0.18) 0%, transparent 70%);
            opacity: 1;
        }
        @keyframes subtleGlow {
            0%,
            100% {
                box-shadow: 0 2px 10px rgba(63, 185, 80, 0.3);
            }
            50% {
                box-shadow: 0 4px 20px rgba(63, 185, 80, 0.55);
            }
        }
        .ticket-cell:hover {
            transform: translateY(-2px);
            z-index: 2;
        }
        .ticket-cell.sold:hover {
            border-color: #4dda5a;
            box-shadow: 0 6px 24px rgba(63, 185, 80, 0.6);
        }
        .ticket-cell.available:hover {
            border-color: #5a5a62;
            background: #25252b;
            color: #aaa;
        }
        .ticket-number {
            font-size: 0.8rem;
            font-weight: 700;
            z-index: 1;
        }
        .ticket-status {
            font-size: 0.55rem;
            z-index: 1;
            font-weight: 500;
            letter-spacing: 0.2px;
        }
        .ticket-cell.sold .ticket-status {
            color: #b8e6c0;
        }
        .ticket-cell.available .ticket-status {
            color: #555;
        }

        /* Destello al vender */
        .ticket-cell.flash {
            animation: flashGreen 0.6s ease-out;
        }
        @keyframes flashGreen {
            0% {
                filter: brightness(2.5);
                box-shadow: 0 0 30px rgba(63, 185, 80, 0.9);
            }
            100% {
                filter: brightness(1);
            }
        }

        @media (max-width: 768px) {
            .ticket-grid {
                grid-template-columns: repeat(auto-fill, minmax(48px, 1fr));
                gap: 5px;
            }
            .ticket-cell {
                min-height: 40px;
                padding: 5px 2px;
                font-size: 0.7rem;
            }
            .btn {
                padding: 6px 10px;
                font-size: 0.72rem;
            }
        }
    </style>
</head>
<body>
    <div class="dashboard">
        <!-- Header -->
        <div class="header">
            <div class="header-left">
                <h1>🎟️ Control de Boletos 1-300</h1>
            </div>
            <div class="total-badge">
                <span>🎯 Vendidos:</span>
                <span class="count" id="soldCount">0</span>
                <span>/ 300</span>
            </div>
            <div class="timestamp" id="liveTimestamp">--:--:--</div>
        </div>

        <!-- Controles -->
        <div class="controls">
            <button class="btn accent" id="btnSell200">🎫 Vender primeros 200</button>
            <button class="btn accent" id="btnSell250">🎫 Vender primeros 250</button>
            <div class="separator"></div>
            <button class="btn" id="btnSellRandom">🎲 Vender 200 aleatorios</button>
            <button class="btn danger" id="btnResetAll">🧹 Reiniciar todos</button>
            <div class="legend">
                <span><span class="legend-dot green"></span> Vendido</span>
                <span><span class="legend-dot gray"></span> Disponible</span>
            </div>
        </div>

        <!-- Grid -->
        <div class="ticket-grid" id="ticketGrid"></div>
    </div>

    <script>
        (function() {
            const TOTAL = 300;
            const STORAGE_KEY = 'ticketSales300';

            // Estado: true = vendido, false = disponible
            let soldStatus = new Array(TOTAL + 1).fill(false); // índice 1..300

            const gridEl = document.getElementById('ticketGrid');
            const soldCountEl = document.getElementById('soldCount');
            const liveTimestampEl = document.getElementById('liveTimestamp');
            const cellElements = {}; // { number: { container, statusEl } }

            // ============ LOCAL STORAGE ============
            function saveState() {
                const data = {
                    sold: soldStatus.slice(1), // guardar solo índices 1-300 como array
                    lastUpdate: Date.now()
                };
                localStorage.setItem(STORAGE_KEY, JSON.stringify(data));
            }

            function loadState() {
                const raw = localStorage.getItem(STORAGE_KEY);
                if (raw) {
                    try {
                        const data = JSON.parse(raw);
                        if (data.sold && Array.isArray(data.sold) && data.sold.length === TOTAL) {
                            for (let i = 0; i < TOTAL; i++) {
                                soldStatus[i + 1] = !!data.sold[i];
                            }
                            return true;
                        }
                    } catch (e) {}
                }
                // Estado inicial: primeros 50 vendidos como demo, o todos disponibles
                for (let i = 1; i <= TOTAL; i++) soldStatus[i] = false;
                return false;
            }

            // ============ CONSTRUIR GRID ============
            function buildGrid() {
                gridEl.innerHTML = '';
                for (let num = 1; num <= TOTAL; num++) {
                    const cell = document.createElement('div');
                    cell.className = 'ticket-cell available';
                    cell.setAttribute('data-ticket', num);
                    cell.title = `Boleto #${num} — Disponible`;
                    cell.innerHTML = `
                            <span class="ticket-number">#${num}</span>
                            <span class="ticket-status" data-role="status">Disp.</span>
                        `;
                    cell.addEventListener('click', () => toggleTicket(num));
                    gridEl.appendChild(cell);
                    cellElements[num] = {
                        container: cell,
                        statusEl: cell.querySelector('[data-role="status"]'),
                    };
                }
            }

            // ============ ACTUALIZAR UNA CELDA ============
            function updateCell(num, flash = false) {
                const { container, statusEl } = cellElements[num];
                const isSold = soldStatus[num];
                if (isSold) {
                    container.classList.add('sold');
                    container.classList.remove('available');
                    statusEl.textContent = 'Vendido';
                    container.title = `Boleto #${num} — Vendido`;
                } else {
                    container.classList.remove('sold');
                    container.classList.add('available');
                    statusEl.textContent = 'Disp.';
                    container.title = `Boleto #${num} — Disponible`;
                }
                if (flash) {
                    container.classList.remove('flash');
                    void container.offsetWidth;
                    container.classList.add('flash');
                    setTimeout(() => container.classList.remove('flash'), 650);
                }
            }

            function refreshAllCells() {
                for (let num = 1; num <= TOTAL; num++) {
                    updateCell(num, false);
                }
            }

            function updateSoldCounter() {
                const count = soldStatus.filter(Boolean).length;
                soldCountEl.textContent = count;
            }

            // ============ TOGGLE INDIVIDUAL ============
            function toggleTicket(num) {
                soldStatus[num] = !soldStatus[num];
                updateCell(num, true);
                updateSoldCounter();
                saveState();
                updateTimestamp();
            }

            // ============ ACCIONES MASIVAS ============
            function sellFirstN(n) {
                for (let i = 1; i <= n; i++) {
                    if (!soldStatus[i]) {
                        soldStatus[i] = true;
                        updateCell(i, true);
                    }
                }
                // También podemos asegurar que los demás no cambien
                updateSoldCounter();
                saveState();
                updateTimestamp();
            }

            function sellRandomN(n) {
                // Seleccionar n boletos aleatorios (sin repetir) y venderlos
                const allIndices = [];
                for (let i = 1; i <= TOTAL; i++) {
                    if (!soldStatus[i]) allIndices.push(i);
                }
                // Mezclar
                for (let i = allIndices.length - 1; i > 0; i--) {
                    const j = Math.floor(Math.random() * (i + 1));
                    [allIndices[i], allIndices[j]] = [allIndices[j], allIndices[i]];
                }
                const toSell = allIndices.slice(0, Math.min(n, allIndices.length));
                for (const num of toSell) {
                    soldStatus[num] = true;
                    updateCell(num, true);
                }
                updateSoldCounter();
                saveState();
                updateTimestamp();
            }

            function resetAll() {
                for (let i = 1; i <= TOTAL; i++) {
                    if (soldStatus[i]) {
                        soldStatus[i] = false;
                        updateCell(i, true);
                    }
                }
                updateSoldCounter();
                saveState();
                updateTimestamp();
            }

            function updateTimestamp() {
                liveTimestampEl.textContent = new Date().toLocaleTimeString('es-ES', { hour12: false });
            }

            // ============ INICIALIZAR ============
            function init() {
                const loaded = loadState();
                buildGrid();
                refreshAllCells();
                updateSoldCounter();
                updateTimestamp();
                if (!loaded) {
                    // Estado inicial: vender primeros 50 como ejemplo
                    for (let i = 1; i <= 50; i++) {
                        soldStatus[i] = true;
                        updateCell(i, false);
                    }
                    updateSoldCounter();
                    saveState();
                }
                // Actualizar timestamp periódicamente
                setInterval(updateTimestamp, 1000);
            }

            // ============ EVENTOS ============
            document.getElementById('btnSell200').addEventListener('click', () => sellFirstN(200));
            document.getElementById('btnSell250').addEventListener('click', () => sellFirstN(250));
            document.getElementById('btnSellRandom').addEventListener('click', () => sellRandomN(200));
            document.getElementById('btnResetAll').addEventListener('click', () => {
                if (confirm('¿Estás seguro de reiniciar todos los boletos a "Disponible"?')) {
                    resetAll();
                }
            });

            // ============ ARRANCAR ============
            init();
            console.log('✅ Panel de control de boletos 1-300 listo.');
            console.log('   🟢 Verde = Vendido  |  ⚫ Gris = Disponible');
            console.log('   💾 Los cambios se guardan automáticamente.');
        })();
    </script>
</body>
</html>
